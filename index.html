<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>从校园到职场 - 思维蜕变看板</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 用于在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 隐藏滚动条但保持可滚动，提升视觉体验 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* 自定义复选框动画 */
        .checkbox-custom:checked + div {
            text-decoration: line-through;
            color: #64748b; /* slate-500 */
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 内置图标组件 (包含新增的 Filter 图标) ---
        const Icon = ({ name, className }) => {
            const svgs = {
                Trash2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                Users: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                Megaphone: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>,
                Code: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
                Mic: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
                ArrowRight: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
                CheckCircle2: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                AlertTriangle: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
                Lightbulb: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
                X: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
                Target: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
                Wrench: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
                TrendingUp: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
                Filter: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            };
            return svgs[name] || null;
        };

        // --- 数字滚动动画组件 ---
        const AnimatedNumber = ({ start = 0, end, decimals = 0, duration = 1500, suffix = '', prefix = '' }) => {
            const [count, setCount] = useState(start);

            useEffect(() => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const easeProgress = progress * (2 - progress); // easeOutQuad 缓动
                    setCount(start + easeProgress * (end - start));
                    
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        setCount(end);
                    }
                };
                window.requestAnimationFrame(step);
            }, [start, end, duration]);

            return (
                <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400">
                    {prefix}{count.toFixed(decimals)}{suffix}
                </span>
            );
        };

        // --- 交互式 SOP 卡片组件 ---
        const SopCard = ({ sop }) => {
            // 使用状态记录哪些清单项被勾选了
            const [checkedItems, setCheckedItems] = useState({});

            const toggleCheck = (idx) => {
                setCheckedItems(prev => ({ ...prev, [idx]: !prev[idx] }));
            };

            // 计算进度
            const completedCount = Object.values(checkedItems).filter(Boolean).length;
            const totalCount = sop.points.length;
            const progress = (completedCount / totalCount) * 100;

            return (
                <div className="bg-slate-800/80 backdrop-blur border border-slate-700 rounded-2xl p-6 hover:border-teal-500/50 transition-all duration-300 relative overflow-hidden group">
                    {/* 进度条背景背景 */}
                    <div 
                        className="absolute top-0 left-0 h-1 bg-teal-500 transition-all duration-500" 
                        style={{ width: `${progress}%` }}
                    ></div>

                    <div className="text-4xl font-black text-slate-700 mb-4 group-hover:text-teal-900 transition-colors">{sop.id}</div>
                    <h3 className="text-lg font-bold text-white mb-2">{sop.title}</h3>
                    <p className="text-sm text-slate-400 mb-6">{sop.desc}</p>
                    
                    <div className="space-y-3">
                        {sop.points.map((point, idx) => (
                            <label key={idx} className="flex items-start cursor-pointer group/item">
                                <div className="relative flex items-center justify-center mt-0.5 mr-3">
                                    <input 
                                        type="checkbox" 
                                        className="checkbox-custom peer appearance-none w-5 h-5 border-2 border-slate-600 rounded-md checked:bg-teal-500 checked:border-teal-500 transition-colors cursor-pointer"
                                        checked={!!checkedItems[idx]}
                                        onChange={() => toggleCheck(idx)}
                                    />
                                    <Icon name="CheckCircle2" className="absolute w-3.5 h-3.5 text-slate-900 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none" />
                                </div>
                                <div className="text-sm text-slate-300 transition-all duration-300 select-none group-hover/item:text-white leading-tight mt-1">
                                    {point}
                                </div>
                            </label>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 数据源 ---
        const projectsData = [
            {
                id: 1, title: "智能垃圾分类屋", owner: "白钰杰", role: "团队协作", icon: "Trash2",
                pain: "信息不同步，团队沟通效率低下", shift: "从被动等待指令，转变为主动沟通", value: "显著提升协作效率，推动目标实现",
                campusMindset: "被动执行，缺乏预判", proMindset: "主动补位，价值创造", metric: null
            },
            {
                id: 2, title: "科交会志愿者工作", owner: "祝梦强", role: "大型活动", icon: "Users",
                pain: "流程推进拖沓，团队内部严重内耗", shift: "打破个人主义，建立集体主义思维", value: "活动顺利进行，促成巨额签约",
                campusMindset: "单打独斗，部门墙", proMindset: "系统协作，齿轮效应", metric: { end: 40.6, decimals: 1, suffix: '亿', label: '促成签约额' }
            },
            {
                id: 3, title: "征兵宣传工作组织", owner: "罗文祥", role: "团队管理", icon: "Megaphone",
                pain: "过度关注单点，忽略整体协同效应", shift: "从纠结完美细节，转向整合全局资源", value: "提升运作顺畅度，充分发挥领导效能",
                campusMindset: "伪完美主义，局部视角", proMindset: "全局视野，系统思维", metric: null
            },
            {
                id: 4, title: "公司小程序开发", owner: "李平洋", role: "研发效能", icon: "Code",
                pain: "开发周期漫长，技术方案脱离实际业务场景", shift: "从闭门造车到敏捷迭代，紧贴业务", value: "创造显著业务价值，大幅缩短流程",
                campusMindset: "交作业心态，忽视终局", proMindset: "业务导向，敏捷迭代", metric: { start: 10, end: 3, decimals: 0, suffix: 'm', prefix: '降至 ', label: '流程耗时缩短' }
            },
            {
                id: 5, title: "校级成长主题分享会", owner: "冯毅", role: "活动运营", icon: "Mic",
                pain: "工作重过程轻结果，最终宣传效果未达预期", shift: "从“交作业”心态转为结果导向", value: "确保核心指标（人数/满意度）100%达成",
                campusMindset: "动作执念，缺乏目标", proMindset: "逆向工作法，结果为先", metric: { end: 100, decimals: 0, suffix: '%', label: '核心指标达成' }
            }
        ];

        const sopData = [
            { id: '01', title: '闭环沟通反馈公式', desc: '告别无效汇报，确保信息流转确定性', points: ['当前进度评估', '已达成的量化指标', '潜在风险/资源请求', '明确下一步时间节点'] },
            { id: '02', title: '技术与业务排障公式', desc: '培养带方案的独立思考能力，拒绝遇事就问', points: ['15分钟文档自查', '提出 A/B 双解决方案', '携带方案向上请示', '协助团队高效决策'] },
            { id: '03', title: '责任阶梯构建', desc: '从“交作业者”向“价值创造者”跃迁', points: ['底线要求：基础交付零差错', '确保严格按时保质完成', '跃迁挑战：每月一项增值贡献', '价值导向：杜绝无意义消耗'] }
        ];

        // 提取所有不重复的角色(标签)用于过滤
        const allRoles = ["全部", ...new Set(projectsData.map(p => p.role))];

        function App() {
            const [selectedProject, setSelectedProject] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [activeFilter, setActiveFilter] = useState("全部");

            const openModal = (project) => {
                setSelectedProject(project);
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setTimeout(() => setSelectedProject(null), 300); // 等待过渡动画
            };

            // 根据当前 filter 筛选项目
            const filteredProjects = projectsData.filter(p => activeFilter === "全部" || p.role === activeFilter);

            return (
                <div className="min-h-screen bg-slate-900 text-slate-200 font-sans selection:bg-teal-500/30">
                    {/* 顶部导航与标题 */}
                    <header className="bg-slate-800/50 backdrop-blur-md border-b border-slate-700 sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <h1 className="text-3xl font-extrabold text-white tracking-tight">
                                        从校园到职场 <span className="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400">思维蜕变看板</span>
                                    </h1>
                                    <p className="mt-2 text-slate-400 text-sm">
                                        THE TRANSFORMATION JOURNEY · 告别“完成任务”，走向“创造价值”
                                    </p>
                                </div>
                                <div className="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                                    <span className="flex h-3 w-3 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-teal-500"></span>
                                    </span>
                                    <span className="text-sm font-medium text-slate-300">系统逻辑推演中</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-16">
                        
                        {/* 核心板块：五大项目复盘 */}
                        <section>
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                                <div className="flex items-center gap-3">
                                    <Icon name="Target" className="text-teal-400 w-6 h-6" />
                                    <h2 className="text-2xl font-bold text-white">五大项目案例深度复盘</h2>
                                </div>
                                
                                {/* 新增：项目分类过滤器 */}
                                <div className="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 hide-scroll">
                                    <Icon name="Filter" className="w-5 h-5 text-slate-500 mr-1" />
                                    {allRoles.map(role => (
                                        <button
                                            key={role}
                                            onClick={() => setActiveFilter(role)}
                                            className={`whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 border ${
                                                activeFilter === role 
                                                ? 'bg-teal-500/20 text-teal-400 border-teal-500/50' 
                                                : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:text-white'
                                            }`}
                                        >
                                            {role}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredProjects.map((project) => (
                                    <div 
                                        key={project.id}
                                        onClick={() => openModal(project)}
                                        className="group relative bg-slate-800 border border-slate-700 rounded-2xl p-6 cursor-pointer overflow-hidden transition-all duration-300 hover:shadow-[0_0_30px_rgba(45,212,191,0.15)] hover:border-teal-500/50 hover:-translate-y-1 animate-in fade-in zoom-in-95"
                                    >
                                        <div className="absolute inset-0 bg-gradient-to-br from-teal-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                        
                                        <div className="relative z-10 flex justify-between items-start mb-4">
                                            <div className="p-3 bg-slate-700/50 text-teal-400 rounded-xl group-hover:bg-teal-500/20 group-hover:scale-110 transition-all duration-300">
                                                <Icon name={project.icon} className="w-8 h-8" />
                                            </div>
                                            <span className="text-xs font-semibold px-3 py-1 bg-slate-900 rounded-full text-teal-400 border border-teal-900/50">
                                                {project.role}
                                            </span>
                                        </div>
                                        
                                        <div className="relative z-10">
                                            <h3 className="text-xl font-bold text-white mb-1">{project.title}</h3>
                                            <p className="text-sm text-teal-400 font-medium mb-4">负责人：{project.owner}</p>
                                            <p className="text-slate-400 text-sm line-clamp-2">
                                                痛点：{project.pain}
                                            </p>
                                        </div>
                                        
                                        <div className="relative z-10 mt-6 flex items-center text-sm font-medium text-cyan-400 group-hover:text-cyan-300">
                                            点击查看思维跃迁 <Icon name="ArrowRight" className="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform" />
                                        </div>
                                    </div>
                                ))}
                                {/* 无搜索结果时的占位 (理论上不会出现，但增加健壮性) */}
                                {filteredProjects.length === 0 && (
                                    <div className="col-span-full py-12 text-center text-slate-500">
                                        无匹配的项目记录
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* 核心板块：SOP 工具包 (已升级为可交互 Checklist) */}
                        <section>
                            <div className="flex items-center gap-3 mb-8">
                                <Icon name="Wrench" className="text-teal-400 w-6 h-6" />
                                <h2 className="text-2xl font-bold text-white">SOP 落地工具包 <span className="text-sm font-normal text-slate-400 ml-2 hidden sm:inline-block">可交互执行清单 (点击打卡)</span></h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {sopData.map((sop) => (
                                    <SopCard key={sop.id} sop={sop} />
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* 模态框：项目复盘详情 */}
                    {isModalOpen && selectedProject && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
                            {/* 背景模糊层 */}
                            <div 
                                className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm transition-opacity"
                                onClick={closeModal}
                            ></div>
                            
                            {/* 模态框主体 */}
                            <div className="relative w-full max-w-3xl max-h-[90vh] overflow-y-auto bg-slate-800 border border-slate-600 rounded-3xl shadow-2xl animate-in fade-in zoom-in-95 duration-200">
                                {/* 顶栏 */}
                                <div className="sticky top-0 z-10 flex justify-between items-center p-6 border-b border-slate-700 bg-slate-800/90 backdrop-blur">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-slate-700 text-teal-400 rounded-xl">
                                            <Icon name={selectedProject.icon} className="w-8 h-8" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl md:text-2xl font-bold text-white">{selectedProject.title}</h3>
                                            <p className="text-sm md:text-base text-slate-400">负责人：{selectedProject.owner} | {selectedProject.role}</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={closeModal}
                                        className="text-slate-400 hover:text-white p-2 rounded-full hover:bg-slate-700 transition-colors"
                                    >
                                        <Icon name="X" className="w-6 h-6" />
                                    </button>
                                </div>

                                {/* 内容区 */}
                                <div className="p-6 md:p-8 space-y-8">
                                    
                                    {/* 对比视图：学生 vs 职业 */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-900 rounded-2xl p-1">
                                        <div className="bg-slate-800 rounded-xl p-5 border border-red-900/30">
                                            <p className="text-xs font-bold text-red-400 uppercase tracking-wider mb-2">学生思维表现</p>
                                            <p className="text-slate-300 font-medium">{selectedProject.campusMindset}</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-teal-900/40 to-slate-800 rounded-xl p-5 border border-teal-900/50">
                                            <p className="text-xs font-bold text-teal-400 uppercase tracking-wider mb-2 flex items-center">
                                                <Icon name="CheckCircle2" className="w-3 h-3 mr-1" /> 职业思维重构
                                            </p>
                                            <p className="text-white font-medium">{selectedProject.proMindset}</p>
                                        </div>
                                    </div>

                                    {/* 拆解分析 */}
                                    <div className="space-y-6">
                                        <div className="flex gap-4 items-start">
                                            <div className="mt-1 bg-red-500/10 p-2 rounded-lg text-red-400 shrink-0">
                                                <Icon name="AlertTriangle" className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <h4 className="text-sm font-bold text-slate-500 mb-1">核心痛点</h4>
                                                <p className="text-slate-200 text-lg">{selectedProject.pain}</p>
                                            </div>
                                        </div>

                                        <div className="flex gap-4 items-start">
                                            <div className="mt-1 bg-yellow-500/10 p-2 rounded-lg text-yellow-400 shrink-0">
                                                <Icon name="Lightbulb" className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <h4 className="text-sm font-bold text-slate-500 mb-1">关键转变</h4>
                                                <p className="text-slate-200 text-lg">{selectedProject.shift}</p>
                                            </div>
                                        </div>

                                        <div className="flex gap-4 items-start">
                                            <div className="mt-1 bg-teal-500/10 p-2 rounded-lg text-teal-400 shrink-0">
                                                <Icon name="TrendingUp" className="w-5 h-5" />
                                            </div>
                                            <div className="w-full">
                                                <h4 className="text-sm font-bold text-slate-500 mb-1">核心价值与成果</h4>
                                                <p className="text-slate-200 text-lg mb-4">{selectedProject.value}</p>
                                                
                                                {/* 动态数据指标 (如果存在) */}
                                                {selectedProject.metric && (
                                                    <div className="bg-slate-900/50 border border-slate-700 rounded-xl p-6 flex flex-col items-center justify-center">
                                                        <div className="text-4xl md:text-5xl font-black mb-2">
                                                            <AnimatedNumber 
                                                                start={selectedProject.metric.start || 0} 
                                                                end={selectedProject.metric.end} 
                                                                decimals={selectedProject.metric.decimals}
                                                                suffix={selectedProject.metric.suffix}
                                                                prefix={selectedProject.metric.prefix}
                                                            />
                                                        </div>
                                                        <p className="text-slate-400 text-sm">{selectedProject.metric.label}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 渲染 React 应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
